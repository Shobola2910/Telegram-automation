services:
  - type: web
    name: eld-monitor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: eld-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_API_ID
        value: 35507477
      - key: TELEGRAM_API_HASH
        value: 201ab47b2a808cc66c3ef61529dba649
      - key: TELEGRAM_PHONE
        value: +998775013234
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: ELD_BASE_URL
        value: https://api.drivehos.app/api/v1
      - key: ELD_BEARER_TOKEN
        sync: false
      - key: ELD_TENANT_ID
        value: 96335ac3-5a93-4a29-af8b-08d874801325
      - key: POLL_INTERVAL_SECONDS
        value: 300
